name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  CI: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Setup Node.js 22.14
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Enable Corepack (Yarn Berry)
        run: |
          corepack enable

      - name: Install rsync and sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Install dependencies
        run: yarn install

      - name: Run type check
        run: yarn typecheck

      - name: Run lint
        run: yarn lint

      - name: Build Storybook
        run: yarn build-storybook

      - name: Copy source to VPS
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ProxyCommand="cloudflared access ssh --hostname %h" $VPS_USER@$VPS_HOST "mkdir -p ~/versaur"

          RSYNC_SSH="sshpass -p '$VPS_PASSWORD' ssh -o StrictHostKeyChecking=no -o ProxyCommand=\"cloudflared access ssh --hostname %h\""

          # Sync only the built Storybook static directory and mirror it on the server
          rsync -avz --delete -e "$RSYNC_SSH" ./storybook-static/ $VPS_USER@$VPS_HOST:~/versaur/storybook-static/
          # Also ensure the Dockerfile, docker-compose.yml and nginx.conf are present at the repo root on the server
          rsync -avz -e "$RSYNC_SSH" ./Dockerfile ./docker-compose.yml ./nginx.conf $VPS_USER@$VPS_HOST:~/versaur/

      - name: Deploy on VPS
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -o ProxyCommand="cloudflared access ssh --hostname %h" $VPS_USER@$VPS_HOST "cd ~/versaur\
            && docker compose down \
            && docker compose build --no-cache \
            && docker compose up -d --force-recreate"
