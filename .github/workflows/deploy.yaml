name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  CI: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      PORT: 2222
      DIR: '~/versaur'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_PRIVATE_KEY }}

      - name: Setup Node.js 22.14
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Run type check
        run: yarn typecheck

      - name: Run lint
        run: yarn lint

      - name: Build Storybook
        run: yarn build-storybook

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.PORT }} ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

          # Setup rsync excludes
          EXCLUDES=(
            --exclude=".git/"
            --exclude="node_modules/"
          )

          echo "--- Syncing files to Homelab ---"
          rsync -avz --delete \
            "${EXCLUDES[@]}" \
            -e "ssh -p ${{ env.PORT }}" \
            ./ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DIR }}

          echo "--- Rebuilding Containers ---"
          ssh -p ${{ env.PORT }} ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << EOF
            cd ${{ env.DIR }}
            docker compose down
            docker compose up -d --build
            docker image prune -f
          EOF
